<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tasker</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class=" theme bg-gray-50 min-h-screen transition-colors duration-300">


    <header class="theme bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="theme text-xl font-semibold text-gray-800">
            ✅ Tasker
        </h1>
        <button id="themebtn"
            class="flex items-center gap-2 px-4 py-2 rounded-lg border border-gray-300 text-sm text-gray-600 hover:bg-gray-100 transition">
            🌙 <span id="theme-label">Dark Mode</span>
        </button>
    </header>

    <main class=" theme flex justify-center px-4 py-10">
        <div class="theme w-full max-w-2xl">
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="theme bg-white rounded-xl border border-gray-200 p-4 text-center shadow-sm">
                    <div id="totalcount" class="text-3xl font-semibold text-red-800">0</div>
                    <div class=" theme text-sm text-gray-500 mt-1">Total Tasks</div>
                </div>
                <div class="theme bg-white rounded-xl border border-gray-200 p-4 text-center shadow-sm">
                    <div id="donecount" class="text-3xl font-semibold text-green-600">0</div>
                    <div class="theme text-sm text-gray-500 mt-1">Completed</div>
                </div>
                <div class="theme bg-white rounded-xl border border-gray-200 p-4 text-center shadow-sm">
                    <div id="pendingcount" class="text-3xl font-semibold text-yellow-500">0</div>
                    <div class="theme text-sm text-gray-500 mt-1">Pending</div>
                </div>
            </div>


            <!-- adding data  -->

            <div class="theme bg-white rounded-xl border border-gray-200 p-5 mb-4 shadow-sm">
                <p class="theme gap-2 flex text-sm font-medium text-gray-500 mb-3"><img src="image/plus.png" alt=""> Add New Task</p>
                <div class="flex gap-3 theme">

                    <input type="text" id="taskinput" placeholder="Task title..." value=""
                        class="theme flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />

                    <select id="selectOption"
                        class="theme border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>


                    <button
                        class="addTask bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                        + Add
                    </button>
                </div>
            </div>

            <div class="theme flex gap-3 mb-4">
                <input type="text" id="searchInput" placeholder="🔍 Search tasks..."
                    class="theme flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
                <select id="searchCategory"
                    class="theme border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="all">All Categories</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="health">Health</option>
                    <option value="other">Other</option>
                </select>
            </div>

<!-- clear -->
            <div class="theme flex justify-between items-center mb-2 px-1">
                <span class="text-sm font-medium text-gray-500">Tasks</span>
                <button class="clearTask text-xs text-red-400 hover:text-red-600 transition">
                    🗑 Clear All
                </button>
            </div>

            <!-- task list  -->
            <div id="tasklist" class="space-y-3">

            </div>
        </div>
    </main>

    <script src="scripts/script.js"></script>
</body>

</html>
